name = "cloudssh"
main = "src/worker/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
# no_bundle = true
workers_dev = false

# Turnstile 验证（可选）
# 在 Cloudflare Dashboard 中创建 Turnstile Widget 后，将密钥配置为环境变量
# [vars]
# TURNSTILE_SECRET = "your-turnstile-secret-key"
# TURNSTILE_SITEKEY = "your-turnstile-site-key"

[[routes]]
pattern = "cloudssh.myzone.bond"
custom_domain = true

[[durable_objects.bindings]]
name = "SSH_SESSION"
class_name = "SSHSessionDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SSHSessionDO"]
